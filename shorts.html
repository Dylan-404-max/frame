<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#000000">

    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://cdn.fluidplayer.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.fluidplayer.com; img-src * data: blob:; media-src * blob:; connect-src *; font-src https://cdnjs.cloudflare.com; frame-src *; object-src 'none'; base-uri 'self';">
    <!-- Security: Prevent iframe embedding (Clickjacking) -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    <!-- Security: Referrer Policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- Dynamic Open Graph Tags -->
    <meta id="ogTitle" property="og:title" content="Xplitleaks Shorts">
    <meta id="ogDescription" property="og:description" content="Watch trending short videos on Xplitleaks">
    <meta id="ogImage" property="og:image" content="">
    <meta property="og:type" content="video.other">
    <meta property="og:site_name" content="Xplitleaks">
    <meta id="ogUrl" property="og:url" content="">
    <meta name="twitter:card" content="summary_large_image">
    <meta id="twitterTitle" name="twitter:title" content="Xplitleaks Shorts">
    <meta id="twitterDescription" name="twitter:description" content="Watch trending short videos on Xplitleaks">
    <meta id="twitterImage" name="twitter:image" content="">
    <meta id="metaDescription" name="description" content="Watch trending short videos on Xplitleaks">

    <title id="pageTitle">Xplitleaks Shorts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Site Config -->
    <script src="site-config.js"></script>

    <style>
        :root {
            --accent: #ff0050;
            --accent-hover: #ff3370;
            --text-main: #ffffff;
            --text-sec: #aaaaaa;
            --bg: #000000;
            --btn-bg: rgba(255,255,255,0.12);
            --btn-hover: rgba(255,255,255,0.22);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text-main);
        }

        /* Scroll Container */
        .scroll-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            background: var(--bg);
        }

        .scroll-container::-webkit-scrollbar { display: none; }

        /* Short Slide */
        .short-slide {
            width: 100%;
            height: 100vh;
            min-height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
        }

        /* Ad Slide */
        .ad-slide {
            width: 100%;
            height: 100vh;
            min-height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
            border-top: 2px solid #333;
            border-bottom: 2px solid #333;
        }

        .ad-slide .ad-container {
            width: 100%;
            max-width: 480px;
            height: 85vh;
            max-height: 85vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            border-radius: 16px;
            overflow: hidden;
        }

        .ad-slide .ad-label {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,0,80,0.3);
            color: var(--text-main);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Video Player */
        .video-wrapper {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
            pointer-events: none;
            z-index: 2;
        }

        .video-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Progress Bar */
        .video-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.15);
            z-index: 4;
            pointer-events: none;
            overflow: hidden;
        }

        .video-progress .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.1s linear;
            border-radius: 0 2px 2px 0;
        }

        .play-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            width: 70px;
            height: 70px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .play-hint.show { opacity: 1; }
        .play-hint i { font-size: 1.8rem; color: white; }

        /* Header (Top) */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent), #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .top-actions { display: flex; align-items: center; gap: 10px; }
        .top-btn {
            width: 40px; height: 40px; border-radius: 50%; background: var(--btn-bg);
            border: none; color: white; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 1rem;
            transition: background 0.2s; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .top-btn:hover { background: var(--btn-hover); }
        .top-btn i { pointer-events: none; }

        /* Right Side Controls */
        .side-controls {
            position: absolute;
            right: 12px;
            bottom: 80px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .side-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 6px 4px;
            transition: transform 0.15s;
            text-decoration: none;
        }
        .side-btn:active { transform: scale(0.9); }

        .side-btn .icon-circle {
            width: 46px; height: 46px; border-radius: 50%; background: var(--btn-bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; transition: background 0.2s;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .side-btn:hover .icon-circle { background: var(--btn-hover); }
        .side-btn.liked .icon-circle { background: var(--accent); }
        .side-btn.liked i { color: white; }
        .side-btn .count { font-size: 0.75rem; font-weight: 600; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .side-btn .label { font-size: 0.7rem; color: var(--text-sec); text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        /* Bottom Info */
        .bottom-info {
            position: absolute;
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            left: 16px;
            right: 80px;
            z-index: 10;
            padding-bottom: 8px;
        }

        .creator-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 4px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            word-break: break-word;
        }

        .video-title {
            font-size: 0.9rem;
            font-weight: 400;
            color: white;
            line-height: 1.5;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Loading States */
        .loading-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error State */
        .error-slide {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-sec);
            text-align: center;
            padding: 20px;
            gap: 12px;
        }
        .error-slide i { font-size: 3rem; color: var(--accent); }
        .error-slide h2 { color: var(--text-main); font-size: 1.3rem; }
        .home-link {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 12px; padding: 10px 20px; background: var(--accent);
            color: white; text-decoration: none; border-radius: 20px;
            font-weight: 600; font-size: 0.9rem;
        }

        /* End of Feed */
        .end-of-feed {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; color: var(--text-sec);
            gap: 16px; text-align: center; padding: 20px;
        }
        .end-of-feed i { font-size: 3rem; color: var(--accent); }
        .end-of-feed h3 { color: white; }
        .refresh-btn {
            padding: 10px 24px; background: var(--accent); border: none;
            color: white; border-radius: 20px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem;
        }

        /* Loading more */
        .loading-more {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.7); padding: 8px 16px;
            border-radius: 20px; font-size: 0.8rem; color: var(--text-sec);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .loading-more.visible { opacity: 1; }
        .loading-more .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Desktop */
        @media (min-width: 768px) {
            .short-slide, .ad-slide { background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
            .slide-inner {
                position: relative; display: flex; align-items: center;
                justify-content: center; height: 100%; max-width: 900px;
                width: 100%; margin: 0 auto; gap: 40px;
            }
            .video-wrapper, .ad-slide .ad-container {
                position: relative; width: auto; height: 85vh; max-height: 85vh;
                aspect-ratio: 9/16; max-width: 480px; border-radius: 16px;
                overflow: hidden; flex-shrink: 0; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            }
            .video-wrapper::after, .video-wrapper::before { border-radius: 16px; }
            .video-wrapper video { border-radius: 16px; }
            .side-controls { position: relative; right: auto; bottom: auto; flex-shrink: 0; gap: 12px; }
            .bottom-info { right: 16px; bottom: 24px; }
            .top-bar { max-width: 900px; left: 50%; transform: translateX(-50%); width: 100%; padding: 16px 24px; }
        }

        @media (max-width: 380px) {
            .side-btn .icon-circle { width: 40px; height: 40px; font-size: 1.1rem; }
            .bottom-info { right: 70px; }
            .side-controls { right: 8px; bottom: 70px; }
        }

        @media (max-width: 767px) {
            .short-slide { padding-bottom: 56px; }
            .ad-slide { padding-bottom: 56px; }
            .bottom-info { bottom: calc(56px + env(safe-area-inset-bottom, 0px)); right: 70px; }
        }
    </style>
</head>
<body>

    <div class="scroll-container" id="scrollContainer">
        <div class="loading-state" id="initialLoader">
            <div class="loading-spinner"></div>
            <p>Loading shorts...</p>
        </div>
    </div>

    <!-- Placement Engine -->
    <script src="placement.js" defer></script>

    <script>
        // ===== Disable console on non-localhost =====
        (function() {
            if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                console.log = function(){};
                console.error = function(){};
                console.warn = function(){};
            }
        })();

        // ===== CONFIG =====
        const CONFIG = {
            apiEndpoint: (typeof SITE_CONFIG !== 'undefined') ? SITE_CONFIG.apiEndpoint : 'https://xplitleaks-api.dylancoral.workers.dev/api',
            sessionId: localStorage.getItem('shorts_sessionId') || ('sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now())
        };
        localStorage.setItem('shorts_sessionId', CONFIG.sessionId);

        // ===== WATCH HISTORY =====
        const HISTORY_KEY = 'shorts_watch_history';
        const MAX_HISTORY = 200;
        const RECENT_WINDOW = 50;

        function loadWatchHistory() {
            try {
                var raw = localStorage.getItem(HISTORY_KEY);
                if (!raw) return createEmptyHistory();
                var data = JSON.parse(raw);
                if (!data.watchedIds || !Array.isArray(data.watchedIds)) return createEmptyHistory();
                return data;
            } catch (e) {
                return createEmptyHistory();
            }
        }

        function createEmptyHistory() {
            return {
                watchedIds: [],
                recentIds: [],
                creatorCounts: {},
                tagPrefs: {},
                categoryPrefs: {},
                lastUpdate: Date.now()
            };
        }

        function saveWatchHistory(history) {
            history.lastUpdate = Date.now();
            if (history.watchedIds.length > MAX_HISTORY) history.watchedIds = history.watchedIds.slice(-MAX_HISTORY);
            if (history.recentIds.length > RECENT_WINDOW) history.recentIds = history.recentIds.slice(-RECENT_WINDOW);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function addToWatchHistory(video) {
            var history = loadWatchHistory();
            var id = video.numericId || video.id;
            var creatorId = video.creatorId || 'unknown';

            history.watchedIds.push(id);
            history.recentIds.push(id);
            history.creatorCounts[creatorId] = (history.creatorCounts[creatorId] || 0) + 1;

            try {
                var tags = video.tags ? JSON.parse(video.tags) : [];
                tags.forEach(function(tag) { history.tagPrefs[tag] = (history.tagPrefs[tag] || 0) + 1; });
            } catch (e) {}
            if (video.category) history.categoryPrefs[video.category] = (history.categoryPrefs[video.category] || 0) + 1;

            saveWatchHistory(history);
        }

        function getHistoryForBackend() {
            var history = loadWatchHistory();
            var normalize = function(obj) {
                var max = Math.max.apply(null, Object.values(obj).concat([1]));
                var result = {};
                for (var k in obj) result[k] = Math.min(obj[k] / max, 1);
                return result;
            };
            return {
                watchedIds: history.watchedIds,
                recentIds: history.recentIds,
                creatorCounts: history.creatorCounts,
                tagPrefs: normalize(history.tagPrefs),
                categoryPrefs: normalize(history.categoryPrefs)
            };
        }

        // ===== OG TAGS =====
        function updateOGTags(video) {
            if (!video) return;
            // DOM-based XSS fix: sanitize title before using in document.title
            var safeTitle = String(video.title || 'Short').replace(/[<>\x00]/g, '');
            var thumbnail = video.thumbnail || '';
            var url = window.location.href;

            document.title = safeTitle + ' - Xplitleaks Shorts';

            var ogUpdates = [
                ['ogTitle', safeTitle],
                ['ogDescription', 'Watch ' + safeTitle + ' on Xplitleaks Shorts'],
                ['ogImage', thumbnail],
                ['ogUrl', url],
                ['twitterTitle', safeTitle],
                ['twitterDescription', 'Watch ' + safeTitle + ' on Xplitleaks Shorts'],
                ['twitterImage', thumbnail],
                ['metaDescription', 'Watch ' + safeTitle + ' on Xplitleaks Shorts']
            ];

            ogUpdates.forEach(function(item) {
                var el = document.getElementById(item[0]);
                if (el) el.setAttribute('content', item[1]);
            });

            var videoMeta = document.querySelector('meta[property="og:video"]');
            if (!videoMeta) {
                videoMeta = document.createElement('meta');
                videoMeta.setAttribute('property', 'og:video');
                document.head.appendChild(videoMeta);
            }
            videoMeta.setAttribute('content', video.videoUrl || '');
        }

        // ===== STATE =====
        var videos = [];
        var currentIndex = 0;
        var globalMuted = false;
        var observer;
        var isLoading = false;
        var hasMore = true;
        var currentPage = 1;
        var likedSet = new Set(JSON.parse(localStorage.getItem('shorts_liked') || '[]'));
        var siteConfig = {};
        var urlUpdateTimeout = null;
        var isNavigatingHistory = false;
        var viewStartTimes = {};
        var preloadBuffer = 3;

        // ===== INPUT VALIDATION =====
        function validateId(id) {
            return id && /^[a-zA-Z0-9_-]+$/.test(String(id));
        }

        // ===== URL NORMALIZER =====
        function resolveMediaUrl(url) {
            if (!url) return '';
            if (url.startsWith('data:')) return url;
            if (url.startsWith('http://') || url.startsWith('https://')) {
                if (url.startsWith('https:///')) {
                    var r2 = siteConfig.r2PublicUrl;
                    if (r2) return 'https://' + r2 + '/' + url.slice(9);
                }
                if (url.startsWith('http:///')) {
                    var r2b = siteConfig.r2PublicUrl;
                    if (r2b) return 'http://' + r2b + '/' + url.slice(8);
                }
                return url;
            }
            if (url.startsWith('//')) return 'https:' + url;
            if (siteConfig.r2PublicUrl) {
                var base = siteConfig.r2PublicUrl.replace(/\/$/, '');
                var path = url.startsWith('/') ? url : '/' + url;
                return 'https://' + base + path;
            }
            return url;
        }

        // ===== SAFE FETCH =====
        async function safeFetch(url, options) {
            if (!navigator.onLine) throw new Error('You are currently offline.');
            var controller = new AbortController();
            var timeoutId = setTimeout(function() { controller.abort(); }, 15000);
            try {
                var response = await fetch(url, Object.assign({}, options || {}, { signal: controller.signal }));
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') throw new Error('Request timed out.');
                throw error;
            }
        }

        // ===== HELPERS =====
        function escapeHtml(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatNumber(num) {
            if (!num || isNaN(num)) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function formatTimeAgo(dateStr) {
            if (!dateStr) return '';
            var d = new Date(dateStr);
            if (isNaN(d)) return '';
            var diff = Math.floor((Date.now() - d) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
            return Math.floor(diff / 604800) + 'w ago';
        }

        async function loadSiteConfig() {
            try {
                var res = await safeFetch(CONFIG.apiEndpoint + '/config');
                siteConfig = await res.json();

                // Inject placement meta tags for placement.js
                if (typeof injectPlacementMeta === 'function') {
                    injectPlacementMeta(siteConfig);
                }
            } catch (e) {
                // Silently handle
            }
        }

        // ===== CREATE SHORT SLIDE =====
        function createSlide(video, index) {
            var id = video.numericId || video.id;
            var isLiked = likedSet.has(id);
            var creator = escapeHtml(video.creatorName || video.creator || 'Unknown');

            var slide = document.createElement('div');
            slide.className = 'short-slide';
            slide.dataset.index = index;
            slide.dataset.shortsId = id;
            slide.id = 'slide-' + index;

            var isDesktop = window.innerWidth >= 768;

            slide.innerHTML = '' +
                (isDesktop ? '<div class="slide-inner">' : '') +
                '<div class="video-wrapper">' +
                    '<video src="' + resolveMediaUrl(video.videoUrl || '') + '"' +
                        ' loop playsinline webkit-playsinline' +
                        ' preload="' + (index < preloadBuffer ? 'auto' : 'metadata') + '"' +
                        ' ' + (globalMuted ? 'muted' : '') +
                        ' data-index="' + index + '" data-id="' + id + '"></video>' +
                    '<div class="play-hint" id="hint-' + index + '"><i class="fas fa-play"></i></div>' +
                    '<div class="loading-state" id="loader-' + index + '">' +
                        '<div class="loading-spinner"></div></div>' +
                    '<div class="video-progress" id="progress-' + index + '">' +
                        '<div class="progress-fill" id="progress-fill-' + index + '"></div></div></div>' +
                '<div class="top-bar">' +
                    '<a href="index.html" class="logo">Xplitleaks</a>' +
                    '<div class="top-actions">' +
                        '<button class="top-btn" id="muteBtn-' + index + '" onclick="toggleMute(event)" title="' + (globalMuted ? 'Unmute' : 'Mute') + '">' +
                            '<i class="fas fa-volume-' + (globalMuted ? 'mute' : 'up') + '"></i></button>' +
                        '<a href="upload.html" class="top-btn" title="Upload"><i class="fas fa-plus"></i></a>' +
                        '<a href="index.html" class="top-btn" title="Home"><i class="fas fa-home"></i></a></div></div>' +
                '<div class="side-controls">' +
                    '<button class="side-btn like-btn ' + (isLiked ? 'liked' : '') + '" onclick="handleLike(event, parseInt(this.closest(\'.short-slide\').dataset.index))" title="Like">' +
                        '<div class="icon-circle"><i class="fas fa-heart"></i></div>' +
                        '<span class="count" id="like-count-' + index + '">' + formatNumber(video.likes || 0) + '</span></button>' +
                    '<button class="side-btn" onclick="handleDislike(event, parseInt(this.closest(\'.short-slide\').dataset.index))" title="Dislike">' +
                        '<div class="icon-circle"><i class="fas fa-thumbs-down"></i></div>' +
                        '<span class="label">Dislike</span></button>' +
                    '<button class="side-btn" onclick="handleShare(event, parseInt(this.closest(\'.short-slide\').dataset.index))" title="Share">' +
                        '<div class="icon-circle"><i class="fas fa-share-nodes"></i></div>' +
                        '<span class="label">Share</span></button>' +
                    '<a class="side-btn" href="report.html?id=' + encodeURIComponent(id) + '&type=short#back=' + encodeURIComponent(window.location.href) + '" title="Report" onclick="event.stopPropagation();">' +
                        '<div class="icon-circle"><i class="fas fa-flag"></i></div>' +
                        '<span class="label">Report</span></a></div>' +
                '<div class="bottom-info">' +
                    '<div class="creator-name">@' + creator + '</div>' +
                    '<div class="video-title">' + escapeHtml(video.title || 'Untitled') + '</div></div>' +
                (isDesktop ? '</div>' : '');

            // Wire up video events
            var v = slide.querySelector('video');

            v.addEventListener('loadedmetadata', function() {
                var liveIndex = parseInt(slide.dataset.index);
                var loader = slide.querySelector('#loader-' + liveIndex);
                if (loader) loader.remove();
                preloadVideos(liveIndex);
            });

            v.addEventListener('error', function(e) {
                var liveIndex = parseInt(slide.dataset.index);
                var loader = slide.querySelector('#loader-' + liveIndex);
                if (loader) {
                    loader.innerHTML = '';
                    var p = document.createElement('p');
                    p.style.color = '#ff4444';
                    p.textContent = 'Failed to load';
                    loader.appendChild(p);
                }
            });

            // Progress bar timeupdate
            v.addEventListener('timeupdate', function() {
                var liveIndex = parseInt(slide.dataset.index);
                var progressFill = slide.querySelector('#progress-fill-' + liveIndex);
                if (progressFill && v.duration) {
                    var pct = (v.currentTime / v.duration) * 100;
                    progressFill.style.width = pct + '%';
                }
            });

            // Reset progress on ended/loop
            v.addEventListener('ended', function() {
                var liveIndex = parseInt(slide.dataset.index);
                var progressFill = slide.querySelector('#progress-fill-' + liveIndex);
                if (progressFill) progressFill.style.width = '0%';
            });

            // Tap to play/pause
            var lastTap = 0;
            v.addEventListener('click', function(e) {
                var now = Date.now();
                var liveIndex = parseInt(slide.dataset.index);
                if (now - lastTap < 300) {
                    handleLike(e, liveIndex);
                } else {
                    togglePlay(liveIndex);
                }
                lastTap = now;
            });

            return slide;
        }

        // ===== CREATE AD SLIDE (Outstream) =====
        var adCounter = 0;

        function createAdSlide(index) {
            // Only create ad slide if outstream ad tags are configured
            if (!siteConfig.outstreamAdTags) return null;
            var adTags;
            try {
                adTags = JSON.parse(siteConfig.outstreamAdTags);
                if (!adTags || !adTags.length) return null;
            } catch(e) { return null; }

            var slide = document.createElement('div');
            slide.className = 'ad-slide';
            slide.dataset.index = index;
            slide.dataset.ad = 'true';
            slide.id = 'slide-' + index;

            var adTag = adTags[adCounter % adTags.length];
            adCounter++;

            var isDesktop = window.innerWidth >= 768;

            slide.innerHTML = '' +
                (isDesktop ? '<div class="slide-inner">' : '') +
                '<div class="ad-container" id="ad-container-' + index + '">' +
                    '<div class="ad-label">Ad</div>' +
                '</div>' +
                '<div class="top-bar">' +
                    '<a href="index.html" class="logo">Xplitleaks</a>' +
                    '<div class="top-actions">' +
                        '<a href="index.html" class="top-btn" title="Home"><i class="fas fa-home"></i></a></div></div>' +
                (isDesktop ? '</div>' : '');

            // Load outstream ad script into container
            setTimeout(function() {
                var container = slide.querySelector('#ad-container-' + index);
                if (container && adTag) {
                    var scriptEl = document.createElement('script');
                    scriptEl.src = adTag;
                    scriptEl.async = true;
                    container.appendChild(scriptEl);
                }
            }, 100);

            return slide;
        }

        // ===== PRELOAD VIDEOS =====
        function preloadVideos(fromIndex) {
            for (var i = fromIndex + 1; i <= fromIndex + preloadBuffer && i < videos.length; i++) {
                var slide = document.querySelector('.short-slide[data-index="' + i + '"]');
                if (slide) {
                    var v = slide.querySelector('video');
                    if (v && v.preload === 'metadata') {
                        v.preload = 'auto';
                        v.load();
                    }
                }
            }
        }

        // ===== PLAYBACK =====
        function togglePlay(index) {
            var slide = document.querySelector('.short-slide[data-index="' + index + '"]');
            if (!slide) return;
            var v = slide.querySelector('video');
            var hint = slide.querySelector('#hint-' + index);
            if (!v) return;

            if (v.paused) {
                v.play().catch(function() {});
                if (hint) {
                    hint.querySelector('i').className = 'fas fa-play';
                    hint.classList.add('show');
                    setTimeout(function() { hint.classList.remove('show'); }, 500);
                }
            } else {
                v.pause();
                if (hint) {
                    hint.querySelector('i').className = 'fas fa-pause';
                    hint.classList.add('show');
                    setTimeout(function() { hint.classList.remove('show'); }, 500);
                }
            }
        }

        function playAtIndex(index) {
            var slide = document.querySelector('.short-slide[data-index="' + index + '"]');
            if (!slide) return;
            var v = slide.querySelector('video');
            if (!v) return;
            v.muted = globalMuted;
            v.play().catch(function() {});
            viewStartTimes[index] = Date.now();
        }

        function pauseAtIndex(index) {
            var slide = document.querySelector('.short-slide[data-index="' + index + '"]');
            if (!slide) return;
            var v = slide.querySelector('video');
            if (v) v.pause();
            trackView(index);
        }

        // ===== MUTE =====
        function toggleMute(e) {
            e.stopPropagation();
            globalMuted = !globalMuted;

            document.querySelectorAll('[id^="muteBtn-"]').forEach(function(btn) {
                var icon = btn.querySelector('i');
                if (icon) icon.className = 'fas fa-volume-' + (globalMuted ? 'mute' : 'up');
                btn.title = globalMuted ? 'Unmute' : 'Mute';
            });

            document.querySelectorAll('video').forEach(function(v) {
                v.muted = globalMuted;
            });

            localStorage.setItem('shorts_muted', globalMuted ? '1' : '0');
        }

        // ===== LIKE =====
        async function handleLike(e, index) {
            if (e) e.stopPropagation();
            var video = videos[index];
            if (!video) return;
            var id = video.numericId || video.id;
            var isLiked = likedSet.has(id);

            var btn = document.querySelector('.short-slide[data-index="' + index + '"] .like-btn');
            var countEl = document.getElementById('like-count-' + index);

            if (isLiked) {
                likedSet.delete(id);
                if (btn) btn.classList.remove('liked');
                video.likes = Math.max((video.likes || 0) - 1, 0);
            } else {
                likedSet.add(id);
                if (btn) btn.classList.add('liked');
                video.likes = (video.likes || 0) + 1;
                if (btn) {
                    btn.style.transform = 'scale(1.3)';
                    setTimeout(function() { btn.style.transform = ''; }, 200);
                }
            }

            if (countEl) countEl.textContent = formatNumber(video.likes);
            localStorage.setItem('shorts_liked', JSON.stringify(Array.from(likedSet)));

            try {
                await fetch(CONFIG.apiEndpoint + '/short/like', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ shortId: id })
                });
            } catch (err) {}
        }

        function handleDislike(e, index) {
            e.stopPropagation();
            var btn = e.currentTarget;
            btn.classList.toggle('disliked');
            var icon = btn.querySelector('.icon-circle');
            if (btn.classList.contains('disliked')) {
                icon.style.background = 'rgba(255, 68, 68, 0.5)';
            } else {
                icon.style.background = '';
            }
        }

        // ===== SHARE =====
        async function handleShare(e, index) {
            e.stopPropagation();
            var video = videos[index];
            if (!video) return;
            var id = video.numericId || video.id;
            var url = window.location.origin + '/shorts.html?id=' + encodeURIComponent(id);

            if (navigator.share) {
                try {
                    await navigator.share({ title: video.title || 'Check this out!', url: url });
                } catch (err) {
                    if (err.name !== 'AbortError') copyToClipboard(url);
                }
            } else {
                copyToClipboard(url);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text)
                .then(function() { alert('Link copied!'); })
                .catch(function() {
                    var ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    alert('Link copied!');
                });
        }

        // ===== URL ROUTING =====
        function updateUrlForVideo(index) {
            var video = videos[index];
            if (!video) return;
            var id = video.numericId || video.id;
            var newUrl = window.location.pathname + '?id=' + encodeURIComponent(id);

            var currentParams = new URLSearchParams(window.location.search);
            if (currentParams.get('id') !== id) {
                history.replaceState({ index: index, id: id, timestamp: Date.now() }, '', newUrl);

                // DOM-based XSS fix: sanitize title
                var safeTitle = String(video.title || 'Short').replace(/[<>\x00]/g, '');
                document.title = safeTitle + ' - Xplitleaks Shorts';
                updateOGTags(video);
            }
        }

        function handleUrlChange() {
            var params = new URLSearchParams(window.location.search);
            var targetId = params.get('id');

            if (!targetId || isNavigatingHistory) return;

            var targetIndex = -1;
            for (var i = 0; i < videos.length; i++) {
                if ((videos[i].numericId || videos[i].id) === targetId) {
                    targetIndex = i;
                    break;
                }
            }

            if (targetIndex !== -1 && targetIndex !== currentIndex) {
                isNavigatingHistory = true;
                goToSlide(targetIndex, false);
                setTimeout(function() { isNavigatingHistory = false; }, 300);
            }
        }

        // ===== VIEW TRACKING =====
        function trackView(index) {
            var video = videos[index];
            if (!video || !viewStartTimes[index]) return;

            var watched = Date.now() - viewStartTimes[index];
            var seconds = watched / 1000;
            delete viewStartTimes[index];

            if (seconds < 2) return;

            var id = video.numericId || video.id;
            var dur = parseDuration(video.duration);
            var fraction = dur > 0 ? seconds / dur : 0;

            addToWatchHistory(video);

            fetch(CONFIG.apiEndpoint + '/short/view', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                body: JSON.stringify({ shortId: id, watchDuration: Math.min(fraction, 1), watchTime: Math.round(seconds) })
            }).catch(function() {});
        }

        function parseDuration(dur) {
            if (!dur) return 30;
            if (typeof dur === 'number') return dur;
            var parts = dur.split(':').map(Number);
            if (parts.length === 2) return parts[0] * 60 + parts[1];
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
            return 30;
        }

        // ===== LOAD VIDEOS =====
        // Random ad interval: 4-6 shorts between ads
        function getNextAdInterval() {
            return Math.floor(Math.random() * 3) + 4; // 4, 5, or 6
        }
        var shortsSinceLastAd = 0;
        var nextAdAt = getNextAdInterval();

        async function loadVideos(page, append, targetId) {
            if (isLoading) return;
            isLoading = true;

            try {
                var container = document.getElementById('scrollContainer');
                if (!append) {
                    container.innerHTML = '';
                    videos = [];
                    currentIndex = 0;
                    hasMore = true;
                    currentPage = 1;
                    shortsSinceLastAd = 0;
                    nextAdAt = getNextAdInterval();
                    adCounter = 0;
                }

                var eof = document.getElementById('endOfFeed');
                if (eof) eof.remove();

                var excludeIds = videos.map(function(v) { return v.numericId || v.id; }).join(',');
                var currentId = targetId || (videos[currentIndex] && (videos[currentIndex].numericId || videos[currentIndex].id));

                if (append) {
                    var loadingMore = document.createElement('div');
                    loadingMore.className = 'loading-more visible';
                    loadingMore.id = 'loadingMore';
                    loadingMore.innerHTML = '<div class="spinner"></div><span>Loading more...</span>';
                    container.appendChild(loadingMore);
                }

                var data;
                try {
                    var history = getHistoryForBackend();
                    var historyHeader = JSON.stringify(history);

                    var fetchHeaders = { 'X-Session-Id': CONFIG.sessionId };
                    fetchHeaders['X-Watch-History'] = historyHeader;

                    var res = await safeFetch(
                        CONFIG.apiEndpoint + '/shorts/recommend?sessionId=' + CONFIG.sessionId + '&limit=10&exclude=' + excludeIds + '&currentId=' + (currentId || ''),
                        { headers: fetchHeaders }
                    );
                    data = await res.json();
                } catch (e) {
                    data = [];
                }

                var loadingMoreEl = document.getElementById('loadingMore');
                if (loadingMoreEl) loadingMoreEl.remove();

                if (!Array.isArray(data) || data.length === 0) {
                    if (!append) {
                        container.innerHTML = '<div class="error-slide"><i class="fas fa-video-slash"></i><h2>No shorts available</h2><a href="index.html" class="home-link"><i class="fas fa-home"></i> Go Home</a></div>';
                    } else {
                        hasMore = false;
                    }
                    isLoading = false;
                    return;
                }

                var startIdx = videos.length;
                videos = videos.concat(data);
                currentPage = page;
                hasMore = data.length > 0;

                data.forEach(function(video, i) {
                    // Check if we should insert an ad slide
                    if (shortsSinceLastAd >= nextAdAt && i > 0) {
                        var adSlide = createAdSlide(startIdx + i);
                        if (adSlide) {
                            container.appendChild(adSlide);
                            shortsSinceLastAd = 0;
                            nextAdAt = getNextAdInterval();
                            // Don't increment i here, the video will be added next
                            startIdx++; // Account for the ad slide
                        }
                    }
                    shortsSinceLastAd++;

                    var slide = createSlide(video, startIdx + i);
                    container.appendChild(slide);
                });

                setupObserver();

                if (targetId && !append) {
                    var targetIndex = -1;
                    for (var ti = 0; ti < videos.length; ti++) {
                        if ((videos[ti].numericId || videos[ti].id) === targetId) {
                            targetIndex = ti;
                            break;
                        }
                    }

                    if (targetIndex === -1) {
                        targetIndex = -1;
                        for (var tj = 0; tj < videos.length; tj++) {
                            if (videos[tj].id === targetId) { targetIndex = tj; break; }
                        }
                    }

                    if (targetIndex !== -1) {
                        requestAnimationFrame(function() {
                            setTimeout(function() {
                                goToSlide(targetIndex, false);
                            }, 150);
                        });
                    } else {
                        try {
                            var res = await safeFetch(CONFIG.apiEndpoint + '/short/' + encodeURIComponent(targetId));
                            if (res.ok) {
                                var targetVideo = await res.json();
                                videos.unshift(targetVideo);
                                var slide = createSlide(targetVideo, 0);
                                container.insertBefore(slide, container.firstChild);

                                document.querySelectorAll('.short-slide').forEach(function(s, idx) {
                                    s.dataset.index = idx;
                                    s.id = 'slide-' + idx;
                                });

                                setupObserver();

                                requestAnimationFrame(function() {
                                    setTimeout(function() { goToSlide(0, false); }, 150);
                                });
                            }
                        } catch (e) {}
                    }
                } else if (!append && videos.length > 0) {
                    setTimeout(function() { playAtIndex(0); }, 200);
                    updateUrlForVideo(0);
                }

            } catch (e) {
                if (!append) {
                    document.getElementById('scrollContainer').innerHTML = '<div class="error-slide"><i class="fas fa-exclamation-triangle"></i><h2>Failed to load</h2><button class="refresh-btn" onclick="refreshFeed()" style="margin-top:12px"><i class="fas fa-redo"></i> Retry</button></div>';
                }
            } finally {
                isLoading = false;
            }
        }

        function refreshFeed() {
            videos = [];
            currentIndex = 0;
            hasMore = true;
            currentPage = 1;
            viewStartTimes = {};
            loadVideos(1, false);
        }

        // ===== SCROLL OBSERVER =====
        function setupObserver() {
            var container = document.getElementById('scrollContainer');
            if (observer) observer.disconnect();

            observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        var idx = parseInt(entry.target.dataset.index);
                        if (isNaN(idx) || idx === currentIndex) return;

                        // Skip ad slides for video playback
                        if (entry.target.dataset.ad === 'true') {
                            pauseAtIndex(currentIndex);
                            currentIndex = idx;
                            return;
                        }

                        pauseAtIndex(currentIndex);
                        currentIndex = idx;
                        playAtIndex(idx);

                        if (urlUpdateTimeout) clearTimeout(urlUpdateTimeout);
                        urlUpdateTimeout = setTimeout(function() {
                            updateUrlForVideo(idx);
                        }, 300);

                        preloadVideos(idx);

                        var nearEnd = idx >= videos.length - 3 || videos.length <= 5;
                        if (nearEnd && hasMore && !isLoading) {
                            loadVideos(currentPage + 1, true);
                        }
                    }
                });
            }, {
                root: container,
                threshold: 0.55
            });

            document.querySelectorAll('.short-slide[data-index], .ad-slide[data-index]').forEach(function(slide) {
                observer.observe(slide);
            });
        }

        // ===== NAVIGATION =====
        function goToSlide(index, pushState) {
            if (index < 0 || index >= videos.length) return;
            var slide = document.querySelector('.short-slide[data-index="' + index + '"], .ad-slide[data-index="' + index + '"]');
            if (slide) {
                var behavior = pushState ? 'smooth' : 'instant';
                slide.scrollIntoView({ behavior: behavior, block: 'start' });

                if (!pushState) {
                    if (slide.dataset.ad !== 'true') {
                        pauseAtIndex(currentIndex);
                        currentIndex = index;
                        playAtIndex(index);
                    }
                    updateUrlForVideo(index);
                }

                if (pushState) {
                    var video = videos[index];
                    if (video) {
                        var id = video.numericId || video.id;
                        history.pushState({ index: index, id: id, timestamp: Date.now() }, '', window.location.pathname + '?id=' + encodeURIComponent(id));
                    }
                }
            }
        }

        // ===== KEYBOARD NAV =====
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

            switch (e.key) {
                case 'ArrowDown':
                case 'ArrowRight':
                    e.preventDefault();
                    goToSlide(currentIndex + 1);
                    break;
                case 'ArrowUp':
                case 'ArrowLeft':
                    e.preventDefault();
                    goToSlide(currentIndex - 1);
                    break;
                case ' ':
                    e.preventDefault();
                    togglePlay(currentIndex);
                    break;
                case 'm':
                    toggleMute({ stopPropagation: function() {} });
                    break;
            }
        });

        // ===== TOUCH / SWIPE =====
        var touchStartY = 0;
        var touchStartTime = 0;

        document.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: true });

        document.addEventListener('touchend', function(e) {
            var diffY = touchStartY - e.changedTouches[0].clientY;
            var diffTime = Date.now() - touchStartTime;
            if (diffTime > 300 || Math.abs(diffY) < 30) return;

            if (diffY > 0) {
                goToSlide(currentIndex + 1);
            } else {
                goToSlide(currentIndex - 1);
            }
        }, { passive: true });

        // ===== HISTORY API =====
        window.addEventListener('popstate', function(e) {
            if (e.state && e.state.index !== undefined) {
                isNavigatingHistory = true;
                var targetIndex = e.state.index;
                if (targetIndex >= 0 && targetIndex < videos.length) {
                    var slide = document.querySelector('.short-slide[data-index="' + targetIndex + '"]');
                    if (slide) slide.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                setTimeout(function() { isNavigatingHistory = false; }, 300);
            } else {
                handleUrlChange();
            }
        });

        // ===== VISIBILITY =====
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                pauseAtIndex(currentIndex);
                trackView(currentIndex);
            } else {
                playAtIndex(currentIndex);
            }
        });

        // ===== RESIZE =====
        var resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                var wasDesktop = document.querySelector('.slide-inner') !== null;
                var isDesktop = window.innerWidth >= 768;
                if (wasDesktop !== isDesktop && videos.length > 0) {
                    var container = document.getElementById('scrollContainer');
                    var currentId = videos[currentIndex] && (videos[currentIndex].numericId || videos[currentIndex].id);
                    container.innerHTML = '';
                    videos.forEach(function(video, i) {
                        container.appendChild(createSlide(video, i));
                    });
                    setupObserver();
                    var targetIndex = -1;
                    for (var i = 0; i < videos.length; i++) {
                        if ((videos[i].numericId || videos[i].id) === currentId) { targetIndex = i; break; }
                    }
                    if (targetIndex !== -1) {
                        setTimeout(function() {
                            var slide = document.querySelector('.short-slide[data-index="' + targetIndex + '"]');
                            if (slide) slide.scrollIntoView({ block: 'start' });
                        }, 100);
                    }
                }
            }, 250);
        });

        // ===== INIT =====
        async function init() {
            globalMuted = localStorage.getItem('shorts_muted') === '1';
            await loadSiteConfig();

            var params = new URLSearchParams(window.location.search);
            var targetId = params.get('id');

            // Validate targetId
            if (targetId && !validateId(targetId)) {
                targetId = null;
            }

            await loadVideos(1, false, targetId);

            if (!window.history.state && videos.length > 0) {
                var id = videos[0] && (videos[0].numericId || videos[0].id);
                if (id) {
                    history.replaceState({ index: 0, id: id, timestamp: Date.now() }, '', window.location.pathname + '?id=' + encodeURIComponent(id));
                    updateOGTags(videos[0]);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
